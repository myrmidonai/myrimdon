version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/myrmidonai/myrmidon/gen
plugins:
  - local: protoc-gen-go
    out: ../engine/gen
    opt: paths=source_relative
  - local: protoc-gen-connect-go
    out: ../engine/gen
    opt: paths=source_relative
